global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: ai_team_local

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: ai_team_api
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8000"]
    # The API runs on the host (uv run uvicorn ...), not in compose.
    # When we move to Iteration 5 server, this becomes a compose service.

rule_files:
  - /etc/prometheus/rules/*.yml
